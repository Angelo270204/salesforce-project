<template>
    <lightning-card title="Engagement Summary" icon-name="standard:metrics">
        <div class="slds-m-around_medium">
            <template if:true={summaryData}>
                <p><strong>Related Opportunity Amount:</strong> 
                    <lightning-formatted-number value={summaryData.opportunityAmount} format-style="currency" currency-code="USD"></lightning-formatted-number>
                </p>
                <p><strong>Completed Tasks:</strong> {summaryData.completedTasks}</p>
                <p><strong>Upcoming Events:</strong> {summaryData.upcomingEvents}</p>

                <div class="slds-m-top_medium">
                    <lightning-button label="Quick Follow-Up Call" variant="brand" onclick={handleQuickCall}></lightning-button>
                </div>
            </template>
            <template if:true={error}>
                <p class="slds-text-color_error">Error loading data.</p>
            </template>
        </div>
    </lightning-card>
</template>
